  matrix-bridge-dingtalk:
    image: ghcr.io/palpo-im/matrix-bridge-dingtalk:main
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./data:/data
    environment:
      RUST_LOG: matrix_bridge_dingtalk=debug,info
      CONFIG_PATH: "/data/config.yaml"
      # Optional: Override configuration with environment variables
