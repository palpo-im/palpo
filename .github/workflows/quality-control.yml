name: Quality control

permissions:
  contents: read

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - '**.rs'                 # only execute on changes to go files
      - '**/Cargo.toml'         # or dependency updates
      - 'Cargo.lock'            # or lockfile updates
      - 'deny.toml'             # or supply-chain policy changes
      - '.github/workflows/**'  # or workflow changes
  push:
    branches:
      - main
    paths:
      - '**.rs'                 # only execute on changes to go files
      - '**/Cargo.toml'         # or dependency updates
      - 'Cargo.lock'            # or lockfile updates
      - 'deny.toml'             # or supply-chain policy changes
      - '.github/workflows/**'  # or workflow changes

jobs:
  typos:
    name: Check typos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Typos check with custom config file
        uses: crate-ci/typos@master

  deny:
    name: Cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # Feature unification is configured in deny.toml ([graph] all-features).
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: ""

  lint:
    name: Rustfmt and Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # rustfmt.toml enables unstable options (unstable_features = true),
      # which only nightly rustfmt honors.
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          components: rustfmt
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: clippy

      - name: Install dependencies
        run: "sudo apt update && sudo apt install -y --no-install-recommends libclang-dev libpq-dev cmake"

      - name: Check formatting
        run: cargo +nightly fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    strategy:
        fail-fast: false
        matrix:
          version:
            - stable
    name: Cargo check ${{ matrix.version }} - x86_64-unknown-linux-gnu
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.version }}
          components: rustfmt, clippy

      - name: Install dependencies
        run: "sudo apt update && sudo apt install -y --no-install-recommends libclang-dev libpq-dev cmake postgresql postgresql-contrib"

      - name: Check build
        run: cargo check --all --bins --examples --tests

      - name: Check release build
        run: cargo check --all --bins --examples --tests --release

      - name: Cargo test
        timeout-minutes: 40
        run: cargo test --all --all-features --no-fail-fast -- --nocapture