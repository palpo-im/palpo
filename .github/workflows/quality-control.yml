name: Quality control

permissions:
  contents: read

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - '**.rs'
      - '**.sh'
      - '**/Cargo.toml'
      - '.github/workflows/**'
  push:
    branches:
      - main
    paths:
      - '**.rs'
      - '**.sh'
      - '**/Cargo.toml'
      - '.github/workflows/**'

jobs:
  typos:
    name: Check typos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: rustfmt, clippy
      - name: Typos check with custom config file
        uses: crate-ci/typos@master

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './tests'

  test:
    strategy:
        fail-fast: false
        matrix:
          version:
            - stable
    name: Cargo check ${{ matrix.version }} - x86_64-unknown-linux-gnu
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.version }}
          components: rustfmt, clippy

      - name: Install dependencies
        run: "sudo apt update && sudo apt install -y --no-install-recommends libclang-dev libpq-dev cmake postgresql postgresql-contrib"

      - name: Check build
        run: cargo check --all --bins --examples --tests

      - name: Check release build
        run: cargo check --all --bins --examples --tests --release

      - name: Cargo test
        timeout-minutes: 40
        run: cargo test --all --all-features --no-fail-fast -- --nocapture