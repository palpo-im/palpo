name: Complement tests

permissions:
  contents: read

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - '**.rs'
      - '**.sh'
      - '**/Cargo.toml'
      - 'tests/complement/**'
      - '.github/workflows/complement.yml'
  push:
    branches:
      - main
    paths:
      - '**.rs'
      - '**.sh'
      - '**/Cargo.toml'
      - 'tests/complement/**'
      - '.github/workflows/complement.yml'
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  complement:
    name: Complement
    runs-on: ubuntu-latest
    timeout-minutes: 150
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: false

      - name: Clone Complement
        run: git clone --depth 1 https://github.com/matrix-org/complement.git /tmp/complement

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build complement-palpo image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: tests/complement/Dockerfile.github
          tags: complement-palpo
          load: true
          cache-from: type=gha,scope=complement
          cache-to: type=gha,mode=max,scope=complement

      - name: Run Complement tests
        id: complement-tests
        run: |
          cd /tmp/complement
          COMPLEMENT_BASE_IMAGE=complement-palpo \
            COMPLEMENT_ENABLE_DIRTY_RUNS=1 \
            go test -tags="palpo_blacklist" -json -count=1 -timeout 120m \
            ./tests/csapi \
            ./tests \
            ./tests/msc3930 \
            ./tests/msc3967 \
            | tee results.jsonl
        continue-on-error: true

      - name: Generate sorted test results
        if: always()
        run: |
          cd /tmp/complement
          grep '^{' results.jsonl \
            | jq -c 'select(.Test != null and (.Action == "pass" or .Action == "fail" or .Action == "skip")) | {Action: .Action, Test: .Test}' \
            > _raw_results.jsonl
          jq -sc 'sort_by(
            (if .Action == "fail" then 0 elif .Action == "skip" then 1 else 2 end),
            .Test
          )[]' _raw_results.jsonl > __test_all.result.jsonl
          grep '^{' results.jsonl \
            | jq -r 'select(.Output != null) | .Output' > results.log
          rm -f _raw_results.jsonl
          echo "=== Test Summary ==="
          echo "Total: $(wc -l < __test_all.result.jsonl)"
          echo "Pass:  $(grep -c '"pass"' __test_all.result.jsonl || true)"
          echo "Fail:  $(grep -c '"fail"' __test_all.result.jsonl || true)"
          echo "Skip:  $(grep -c '"skip"' __test_all.result.jsonl || true)"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: complement-results
          path: |
            /tmp/complement/__test_all.result.jsonl
            /tmp/complement/results.jsonl
            /tmp/complement/results.log
          if-no-files-found: warn
          retention-days: 14

      - name: Evaluate test results
        if: always()
        run: |
          RESULTS="/tmp/complement/__test_all.result.jsonl"
          if [ ! -f "$RESULTS" ]; then
            echo "::error::Test results file not found"
            exit 1
          fi
          FAIL_COUNT=$(grep -c '"fail"' "$RESULTS" || true)
          PASS_COUNT=$(grep -c '"pass"' "$RESULTS" || true)
          TOTAL=$((FAIL_COUNT + PASS_COUNT))
          echo "Pass: $PASS_COUNT, Fail: $FAIL_COUNT, Total: $TOTAL"
          if [ "$TOTAL" -eq 0 ]; then
            echo "::error::No test results found"
            exit 1
          fi
          PASS_RATE=$((PASS_COUNT * 100 / TOTAL))
          echo "Pass rate: ${PASS_RATE}%"
          if [ "$PASS_RATE" -lt 90 ]; then
            echo "::error::Pass rate ${PASS_RATE}% is below 90% threshold"
            exit 1
          fi
          echo "✅ Pass rate ${PASS_RATE}% meets the 90% threshold"
