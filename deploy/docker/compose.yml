services:
  postgres:
    hostname: postgres
    image: postgres:18
    restart: always
    ports:
      - 127.0.0.1:5432:5432
    volumes:
      - ./data/pgsql:/var/lib/postgresql
    environment:
      POSTGRES_PASSWORD: ${PALPO_POSTGRES_PASSWORD:?set PALPO_POSTGRES_PASSWORD in deploy/docker/.env}
      POSTGRES_USER: palpo
      POSTGRES_DB: palpo
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U palpo"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal

  palpo:
    image: ghcr.io/palpo-im/palpo:latest
    ports:
      - 8008:8008
      - 8448:8448
    environment:
      PALPO_CONFIG: '/var/palpo/palpo.toml'
      PALPO_DB__URL: postgres://palpo:${PALPO_POSTGRES_PASSWORD:?set PALPO_POSTGRES_PASSWORD in deploy/docker/.env}@postgres:5432/palpo
    volumes:
      - $PWD/palpo.toml:/var/palpo/palpo.toml
      - $PWD/data/media:/var/palpo/media
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped

networks:
  internal:
    attachable: true
